  - id: zero_copy_layout_bridge_accept
    feature: zero_copy_layout_bridge
    verdict: accept
    expected_contract: linear_matmul_with_axis_maps
    regression_test: ../../tests/test_p0_semantics_and_fusion.py::test_extended_multi_einsum_regions_cover_layout_batch_and_fanout
  - id: broadcast_batch_flatten_accept
    feature: broadcast_batch_flatten
    verdict: accept
    expected_contract: broadcast_batch_linear_matmul
    regression_test: ../../tests/test_p0_semantics_and_fusion.py::test_extended_multi_einsum_regions_cover_layout_batch_and_fanout
  - id: fanout_tree_accept
    feature: fanout_tree
    verdict: accept
    expected_contract: matmul_fanout_tree
    regression_test: ../../tests/test_p0_semantics_and_fusion.py::test_extended_multi_einsum_regions_cover_layout_batch_and_fanout
  - id: conditional_alias_reject
    feature: conditional_alias_rejection
    verdict: reject
    expected_contract: no_verified_multi_einsum_region
    regression_test: ../../tests/test_p0_semantics_and_fusion.py::test_extended_multi_einsum_regions_cover_layout_batch_and_fanout
  - id: extended_artifact_replay_accept
    feature: artifact_replay
    verdict: accept
    expected_contract: independently_recomposed_raw_mapping_evidence
