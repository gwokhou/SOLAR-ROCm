resource_model_version: amd_resource_v1
# MFMA rates use the published matrix throughput.  The other resources use
# the RDNA4 packed-FP16 VOPD issue ceiling (32 CU * 512 ops/CU/cycle * 3.13
# GHz).  That deliberately loose ceiling cannot tighten TSOL using an
# empirical result; calibration only checks it for contradictions.
resource_limits:
  mfma:
    "fp32->fp32": 25600000000000
    "fp16->fp32": 103000000000000
    "bf16->fp32": 103000000000000
    "fp8->fp32": 205000000000000
    "int8->int32": 205000000000000
    "int4->int32": 410000000000000
