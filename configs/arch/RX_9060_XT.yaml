calibration_exempt_modes:
  mfma:
    "int4->int32": RDNA4 ISA defines IU4 WMMA, but ROCm 7.2 rocWMMA lists no INT4 type and PyTorch 2.11 exposes no validated gfx1200 INT4 matrix API; published peak remains source-only
precision_support:
  fp32:
    hardware: native
    software: pytorch_production
    calibration: required
    evidence: https://rocm.docs.amd.com/projects/radeon-ryzen/en/docs-7.2/docs/compatibility/compatibilityrad/native_linux/native_linux_compatibility.html
  fp16:
    hardware: native_wmma
    software: pytorch_production
    calibration: required
    evidence: https://rocm.docs.amd.com/projects/radeon-ryzen/en/docs-7.2/docs/compatibility/compatibilityrad/native_linux/native_linux_compatibility.html
  bf16:
    hardware: native_wmma
    software: rocwmma_supported_pytorch_empirical
    calibration: required
    evidence: https://rocm.docs.amd.com/projects/rocWMMA/en/docs-7.2.1/API_Reference_Guide.html
  fp8:
    hardware: native_wmma_input_only
    software: rocwmma_supported_pytorch_private_api_validated
    calibration: required
    evidence: https://rocm.docs.amd.com/projects/rocWMMA/en/docs-7.2.1/API_Reference_Guide.html
    formats: [float8_e4m3fn, float8_e5m2]
  int8:
    hardware: native_wmma
    software: pytorch_production_dtype_private_probe
    calibration: required
    evidence: https://rocm.docs.amd.com/projects/radeon-ryzen/en/docs-7.2/docs/compatibility/compatibilityrad/native_linux/native_linux_compatibility.html
  int4:
    hardware: native_wmma
    software: isa_only_no_validated_rocm_matrix_api
    calibration: exempt
    evidence: https://www.amd.com/content/dam/amd/en/documents/radeon-tech-docs/instruction-set-architectures/rdna4-instruction-set-architecture.pdf
    limitation: ROCm 7.2 rocWMMA exposes no INT4 type and PyTorch 2.11 has no validated gfx1200 INT4 matrix API; the published peak is source-only.
audit_evidence:
  status: verified
  path: configs/arch/evidence/RX_9060_XT_resource_audit.yaml
