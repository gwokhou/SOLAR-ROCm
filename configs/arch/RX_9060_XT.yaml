  gfx_target: gfx1200
# RDNA4/gfx1200 implements the OCP E4M3 and E5M2 encodings.  FNUZ is a
# gfx94x format and must not be scored against this profile.
precision_aliases:
  float8_e4m3fn: fp8
  float8_e5m2: fp8
