  - id: installed_toolchain_identity_accept
    feature: toolchain_identity
    verdict: accept
    expected_contract: provenance_manifest_hash_bound
    regression_test: ../../tests/test_orojenesis_toolchain_identity.py::test_installed_toolchain_identity_is_hash_bound
  - id: toolchain_tamper_reject
    feature: toolchain_identity
    verdict: reject
    expected_contract: binary_or_revision_identity_mismatch
    regression_test: ../../tests/test_orojenesis_toolchain_identity.py::test_installed_toolchain_rejects_binary_and_revision_tampering
